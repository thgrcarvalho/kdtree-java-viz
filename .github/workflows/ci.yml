name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kdtree-java (sibling dep)
        uses: actions/checkout@v4
        with:
          repository: thgrcarvalho/kdtree-java
          path: kdtree-java

      - name: Checkout kdtree-java-viz
        uses: actions/checkout@v4
        with:
          path: kdtree-java-viz

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish kdtree-java snapshot to mavenLocal
        working-directory: kdtree-java
        run: ./gradlew publishToMavenLocal

      - name: Build kdtree-java-viz
        working-directory: kdtree-java-viz
        run: ./gradlew build
